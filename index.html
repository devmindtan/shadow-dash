<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Dash</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="player"></div>
    <div id="shieldRing" class="hidden"></div>
    <div id="waveBanner" class="hidden"></div>
    <div id="hud">
      <span id="score">0.0</span>
      <span id="bestScore" class="hud-badge">BEST 0.0</span>
      <span id="health"></span>
      <span id="shield" class="hud-badge hidden">SHIELD</span>
      <span id="dash" class="hud-badge">DASH</span>
    </div>
    <div id="upgradeLog"></div>
    <div id="menu">
      <h1 id="menuTitle">SHADOW DASH</h1>
      <p class="hint" id="menuHint">Di chuyển bằng phím mũi tên hoặc WASD, Space để Dash. Né các quả cầu bóng tối, thu thập điểm sáng để có khiên bảo vệ.</p>
      <p id="finalScore" class="hidden"></p>
      <div id="characterSelect"></div>
      <p class="hint" id="characterInfo"></p>
      <button type="button" id="libraryBtn">Thư Viện</button>
      <p class="start-hint" id="startHint">Nhấn Space hoặc bấm chuột để bắt đầu</p>
    </div>
    <div id="upgradePick" class="hidden">
      <h1>CHỌN NÂNG CẤP</h1>
      <div id="upgradeCards"></div>
    </div>
    <div id="library" class="hidden">
      <div id="libraryBook">
        <div id="libraryCover">
          <h1>THƯ VIỆN</h1>
          <p class="library-subtitle">Sổ Tay Bóng Tối</p>
        </div>
        <div id="libraryPage">
          <div id="libraryTabs">
            <button type="button" class="library-tab selected" data-tab="orbLibrary">Chương I — Quái Vật</button>
            <button type="button" class="library-tab" data-tab="upgradeLibrary">Chương II — Nâng Cấp</button>
          </div>
          <div id="orbLibrary" class="library-grid"></div>
          <div id="upgradeLibrary" class="library-grid hidden"></div>
        </div>
      </div>
      <button type="button" id="libraryCloseBtn">Đóng</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
